<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta id="theme-color" name="theme-color" content="#111111" />
    <link id="icon" rel="icon" href="" type="image/png">
    <meta
      name="description"
      content="Bermain sambil belajar. Belajar dengan cara berbeda, atau 
      sekedar untuk mengetes diri untuk persiapan menghadapi tes psikotes 
      hitungan pada saat melamar kerja"
    />
    <meta name="keywords" content="Game, Math, Matematika" />
    <meta name="author" content="Nasri Anas" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="game.css" />

    <style>
      * {
        font-family: "Poppins", sans-serif;
      }
    </style>
    <script src="game.js" defer></script>
    <title>Game Aritmatika</title>
  </head>
  <body>
    <header>
      <div class="header">
        <div class="home">
          <a href="/index.html">Home</a>
        </div>

        <div class="nav">
          <div class="pilihan">
            <div class="pilih-operator">
              <select class="operators" id="operators">
                <option class="dropdown" value="tambah">TAMBAH (+)</option>
                <option class="dropdown" value="kurang">KURANG (-)</option>
                <option class="dropdown" value="kali">KALI (x)</option>
                <option class="dropdown" value="bagi">BAGI (:)</option>
              </select>
            </div>
            <!--
            <div class="pilih-besaran">
              <select class="besaran" id="besaran">
                <option class="dropdown" value="satuan">SATUAN</option>
                <option class="dropdown" value="puluhan">PULUHAN</option>
                <option class="dropdown" value="ratusan">RATUSAN</option>
                <option class="dropdown" value="ribuan">RIBUAN</option>
              </select>
            </div>

            -->
          </div>
          <div class="start" onclick="startGame()">
            START
          </div>
        </div>
      </div>
    </header>



    <div class="white-area">
      <!--
<div class="score-area">
        <h2>Top 5</h2>
        <ol>
          <li id="score1"></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
        </ol>
      </div>
      -->

      <div class="main-area">
        <div class="game-lain">
          <a href="game-tebakan.html">ADA YANG BARU !!!</a>
        </div>

        <p class="timer" id="timer"></p>
        <div class="penjumlahan">
          <div class="angka" id="angka">
            <p type="text" class="angka1" id="angka1" value=" "></p>
            <div class="operator" id="aritmatika" value=" "></div>
            <p type="text" class="angka2" id="angka2" value=" "></p>
            <div class="samadengan" id="samaDengan" value=" "></div>
            <p type="text" class="hasil" id="jawaban" value=" "></p>
          </div>
          <div class="input" id="masukan">
            <input
              id="input"
              type="number"
              class="input-text"
              value=""
              placeholder="Masukkan Tebakan"
              onfocus="this.value=''"
            />
            <button
              type="button"
              class="submit"
              id="tebakButton"
              value=""
              onclick="myTebak()"
            >
              TEBAK
            </button>

            <p class="poin" id="poin"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="winning-message" id="winningMessage">
      <div class="data-winning-message-text">Waktu Habis</div>
      <div class="poin-message" id="poinMessage"></div>
      <div>
        <button id="restartButton" onclick="startGame()">Restart</button>
        <!--<button id="shareButton" onclick="startGame()">Bagikan</button>-->
      </div>
      <form class="upload-score" name="score" method="POST" data-netlify="true">
        <p>
          Kirim Skor Anda:
        </p>
        <p>
          <label>
            <input
              class="input-text"
              id="inputName"
              type="text"
              value=""
              name="name"
              placeholder="Masukkan Nama Anda"
          /></label>
        </p>
        <p>
          <label>
            <input
              name="skor"
              type="number"
              class="input-text"
              id="skor-anda"
              value=""
              readonly
            />
          </label>
        </p>
        <p>
          <button type="submit" class="kirim-skor" onclick="topScore()">
            Kirim
          </button>
        </p>
      </form>
    </div>
    
    <script>
      var namaPertama = document.getElementById("inputName").innerText;

      var pertama = "masuk";
      var nilai = "44";
      function topScore() {
        document.getElementById("score1").innerHTML =
          pertama + " (" + nilai + ")";
      }
    </script>
    <script>
      var meta = document.getElementById("description");
      if(meta){
          meta.innerText;
          document.getElementById("meta-description").content = meta;
      }

      // document.getElementById("theme-color").content = " #03dac5";
      document.getElementById("theme-color").content = " #111111";
      document.getElementById("icon").href = "/img/logo.svg";

      const winningMessageElement = document.getElementById("winningMessage");
      var operasi;
      //const restartButton = document.getElementById("restartButton");

      var hasil;
      var poin = 0;
      var mulai = 0;

      var muncul = "none";
      document.getElementById("input").style.display = muncul;
      document.getElementById("tebakButton").style.display = muncul;

      var klikEnter = document.getElementById("input");
      klikEnter.addEventListener("keyup", function (event) {
        if (event.keyCode === 13) {
          myTebak();
        }
      });

      var pilihanWaktu = 30;
      var timeLeft = pilihanWaktu;

      document.getElementById("timer").innerHTML = "Klik START untuk Memulai";
      document.getElementById("samaDengan").innerHTML = " ";
      document.getElementById("hasil").innerHTML = " ";

      function startGame() {
        if (mulai == 0) {
          setInterval(countdown, 1000);
        }
        muncul = "block";
        document.getElementById("input").style.display = muncul;
        document.getElementById("tebakButton").style.display = muncul;

        document.getElementById("samaDengan").innerHTML = "=";
        document.getElementById("jawaban").innerHTML = "?";
        operasi = document.getElementById("operators").value;
        winningMessageElement.classList.remove("show");
        poin = 0;
        timeLeft = pilihanWaktu;
        myTebak();
      }

      function myTebak() {
        tebakan = document.getElementById("input").value;
        if (tebakan != "" && timeLeft != 0) {
          if (tebakan == hasil) {
            poin = poin + 2;
          } else {
            poin = poin - 1;
          }
        }
        document.getElementById("poin").innerHTML = "Jumlah poin: " + poin + " Poin";
        document.getElementById("input").value = "";
        if (timeLeft != 0) {
          myNext();
        }
        return poin;
      }

      function myNext() {
        var angka1 = (document.getElementById("angka1").innerHTML = Math.floor(
          Math.random() * 10
        ));
        var angka2 = (document.getElementById("angka2").innerHTML = Math.floor(
          Math.random() * 10
        ));

        if (operasi == "tambah") {
          hasil = angka1 + angka2;
          document.getElementById("aritmatika").innerHTML = "+";
        } else if (operasi == "kurang") {
          hasil = angka1 - angka2;
          document.getElementById("aritmatika").innerHTML = "-";
        } else if (operasi == "kali") {
          hasil = angka1 * angka2;
          document.getElementById("aritmatika").innerHTML = "x";
        } else if (operasi == "bagi") {
          hasil = angka1 / angka2;
          document.getElementById("aritmatika").innerHTML = ":";
        }
        document.getElementById("hasil").innerHTML = hasil;
        return hasil;
      }

      function countdown() {
        if (timeLeft == 0) {
          winningMessageElement.classList.add("show");
          document.getElementById("poinMessage").innerHTML =
            "Jumlah poin: " + poin + " Poin";
          document.getElementById("timer").innerHTML =
            "Waktu Tersisa " + timeLeft + " detik";
          document.getElementById("skor-anda").value = poin;
        } else {
          document.getElementById("timer").innerHTML =
            "Waktu Tersisa " + timeLeft + " detik";
          timeLeft--;
        }
        mulai = 1;
        return mulai;
      }

    </script>

  </body>
</html>
