<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Steering Combat Simulation</title>
<style>
body { margin:0; background:#0b0f1a; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =====================
// CONFIG
// =====================
const BULLET_SPEED = 6;
const NUM_AIRCRAFT = 6;
const MAX_SPEED = 2.5;
const TURN_RATE = 0.05;
const FOV = Math.PI / 6; // 30 deg

// =====================
// OBJECTS
// =====================
let turret = {
    x: canvas.width/2,
    y: canvas.height - 80,
    angle: 0,
    alive: true,
    respawnTimer: 0
};

let aircrafts = [];
let bullets = [];
let enemyBullets = [];
let explosions = [];

// =====================
// SPAWN
// =====================
function spawnAircraft() {
    aircrafts.push({
        x: Math.random()*canvas.width,
        y: Math.random()*(canvas.height/2),
        vx: Math.random()*2-1,
        vy: Math.random()*2-1,
        angle: 0,
        alive: true,
        shootCooldown: 0,
        wanderAngle: Math.random()*Math.PI*2
    });
}

for(let i=0;i<NUM_AIRCRAFT;i++) spawnAircraft();

// =====================
// STEERING BEHAVIOR
// =====================
function updateSteering(a) {
    // wander
    a.wanderAngle += (Math.random()-0.5)*0.3;

    let desiredX = Math.cos(a.wanderAngle);
    let desiredY = Math.sin(a.wanderAngle);

    // smooth turning
    a.vx += desiredX * 0.05;
    a.vy += desiredY * 0.05;

    let speed = Math.sqrt(a.vx*a.vx + a.vy*a.vy);
    if(speed > MAX_SPEED){
        a.vx = (a.vx/speed)*MAX_SPEED;
        a.vy = (a.vy/speed)*MAX_SPEED;
    }

    a.angle = Math.atan2(a.vy, a.vx);

    a.x += a.vx;
    a.y += a.vy;

    // wrap around
    if(a.x < 0) a.x = canvas.width;
    if(a.x > canvas.width) a.x = 0;
    if(a.y < 0) a.y = canvas.height/2;
    if(a.y > canvas.height/2) a.y = 0;
}

// =====================
// DRAW
// =====================
function drawAircraft(a){
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.angle);

    ctx.fillStyle = a.alive ? "cyan" : "orange";

    ctx.beginPath();
    ctx.moveTo(15,0);
    ctx.lineTo(-10,7);
    ctx.lineTo(-10,-7);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function drawTurret(){
    if(!turret.alive) return;

    ctx.fillStyle="gray";
    ctx.beginPath();
    ctx.arc(turret.x,turret.y,20,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="white";
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(turret.x,turret.y);
    ctx.lineTo(
        turret.x + Math.cos(turret.angle)*50,
        turret.y + Math.sin(turret.angle)*50
    );
    ctx.stroke();
}

function drawBullets(){
    ctx.strokeStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.moveTo(b.x,b.y);
        ctx.lineTo(b.x - b.vx*2, b.y - b.vy*2);
        ctx.stroke();
    });

    ctx.strokeStyle="red";
    enemyBullets.forEach(b=>{
        ctx.beginPath();
        ctx.moveTo(b.x,b.y);
        ctx.lineTo(b.x - b.vx*2, b.y - b.vy*2);
        ctx.stroke();
    });
}

function drawExplosions(){
    explosions.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
        ctx.strokeStyle="orange";
        ctx.stroke();
    });
}

// =====================
// TARGETING
// =====================
function getLeadTarget(a){
    const dx = a.x - turret.x;
    const dy = a.y - turret.y;

    const dist = Math.sqrt(dx*dx + dy*dy);
    const t = dist / BULLET_SPEED;

    return {
        x: a.x + a.vx*t,
        y: a.y + a.vy*t
    };
}

// =====================
// UPDATE
// =====================
function updateAircraft(){
    aircrafts.forEach(a=>{
        if(!a.alive) return;

        updateSteering(a);

        if(!turret.alive) return;

        const angleToTurret = Math.atan2(turret.y - a.y, turret.x - a.x);
        let diff = Math.abs(normalizeAngle(angleToTurret - a.angle));

        a.shootCooldown--;

        if(diff < FOV && a.shootCooldown < 0){
            enemyBullets.push({
                x: a.x,
                y: a.y,
                vx: Math.cos(a.angle)*4,
                vy: Math.sin(a.angle)*4
            });
            a.shootCooldown = 80 + Math.random()*40;
        }
    });
}

function updateTurret(){
    if(!turret.alive){
        turret.respawnTimer--;
        if(turret.respawnTimer < 0){
            turret.alive = true;
            turret.x = Math.random()*canvas.width;
            turret.y = Math.random()*canvas.height;
        }
        return;
    }

    let target = aircrafts.find(a=>a.alive);
    if(!target) return;

    let lead = getLeadTarget(target);
    turret.angle = Math.atan2(lead.y - turret.y, lead.x - turret.x);
}

function shoot(){
    if(!turret.alive) return;

    bullets.push({
        x: turret.x,
        y: turret.y,
        vx: Math.cos(turret.angle)*BULLET_SPEED,
        vy: Math.sin(turret.angle)*BULLET_SPEED
    });
}

// =====================
// COLLISION
// =====================
function updateBullets(){
    bullets.forEach(b=>{
        b.x+=b.vx;
        b.y+=b.vy;

        aircrafts.forEach(a=>{
            if(!a.alive) return;
            if(dist(b,a)<15){
                a.alive=false;
                explosions.push({x:a.x,y:a.y,radius:5});
            }
        });
    });

    enemyBullets.forEach(b=>{
        b.x+=b.vx;
        b.y+=b.vy;

        if(turret.alive && dist(b,turret)<20){
            turret.alive=false;
            turret.respawnTimer=120;
            explosions.push({x:turret.x,y:turret.y,radius:10});
        }
    });

    bullets = bullets.filter(inBounds);
    enemyBullets = enemyBullets.filter(inBounds);
}

function updateExplosions(){
    explosions.forEach(e=>e.radius+=1.5);
    explosions = explosions.filter(e=>e.radius<20);
}

// =====================
// HELPERS
// =====================
function dist(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function inBounds(b){
    return b.x>0 && b.x<canvas.width && b.y>0 && b.y<canvas.height;
}

function normalizeAngle(a){
    return Math.atan2(Math.sin(a), Math.cos(a));
}

// =====================
// LOOP
// =====================
let shootTimer=0;

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    updateAircraft();
    updateTurret();
    updateBullets();
    updateExplosions();

    aircrafts.forEach(drawAircraft);
    drawTurret();
    drawBullets();
    drawExplosions();

    shootTimer++;
    if(shootTimer>15){
        shoot();
        shootTimer=0;
    }

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
