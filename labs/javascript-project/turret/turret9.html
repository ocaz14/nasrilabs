<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Combat Simulation</title>
<style>
body {
    margin: 0;
    background: #0b0f1a;
    overflow: hidden;
    touch-action: none;
}
canvas {
    display: block;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// =====================
// RESPONSIVE CANVAS
// =====================
function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// =====================
// CONFIG (scaled)
// =====================
const BULLET_SPEED = 5;
const MAX_SPEED = 2.3;
const TURN_RATE = 0.025;
const SPAWN_INTERVAL = 80;
const EVADE_RADIUS = 130;

// =====================
// OBJECTS
// =====================
let turret = {
    x: window.innerWidth/2,
    y: window.innerHeight/2,
    angle: 0,
    alive: true,
    respawnTimer: 0
};

let aircrafts = [];
let bullets = [];
let explosions = [];

// =====================
// SPAWN EDGE
// =====================
function spawnAircraft(){
    let side = Math.floor(Math.random()*4);
    let x,y,vx,vy;

    if(side===0){ // left
        x=-30; y=Math.random()*window.innerHeight;
        vx=2; vy=(Math.random()-0.5);
    }
    else if(side===1){ // right
        x=window.innerWidth+30; y=Math.random()*window.innerHeight;
        vx=-2; vy=(Math.random()-0.5);
    }
    else if(side===2){ // top
        x=Math.random()*window.innerWidth; y=-30;
        vx=(Math.random()-0.5)*2; vy=2;
    }
    else { // bottom
        x=Math.random()*window.innerWidth; y=window.innerHeight+30;
        vx=(Math.random()-0.5)*2; vy=-2;
    }

    aircrafts.push({
        x,y,vx,vy,
        angle: Math.atan2(vy,vx),
        wanderAngle: Math.random()*Math.PI*2
    });
}

// =====================
// STEERING
// =====================
function updateSteering(a){
    let currentAngle = a.angle;

    // wander
    a.wanderAngle += (Math.random()-0.5)*0.2;
    let wanderX = Math.cos(a.wanderAngle);
    let wanderY = Math.sin(a.wanderAngle);

    // predictive evade
    let evadeX = 0, evadeY = 0;

    bullets.forEach(b=>{
        let dx = a.x - b.x;
        let dy = a.y - b.y;
        let dist = Math.hypot(dx,dy);

        if(dist < EVADE_RADIUS){
            let t = dist / BULLET_SPEED;

            let fx = b.x + b.vx*t;
            let fy = b.y + b.vy*t;

            let ex = a.x - fx;
            let ey = a.y - fy;
            let d2 = Math.hypot(ex,ey);

            if(d2 > 0){
                let strength = (EVADE_RADIUS - dist)/EVADE_RADIUS;
                evadeX += (ex/d2) * strength * 1.8;
                evadeY += (ey/d2) * strength * 1.8;
            }
        }
    });

    let desiredX = wanderX*0.5 + evadeX;
    let desiredY = wanderY*0.5 + evadeY;

    let desiredAngle = Math.atan2(desiredY, desiredX);

    let diff = normalizeAngle(desiredAngle - currentAngle);
    diff = Math.max(-TURN_RATE, Math.min(TURN_RATE, diff));

    a.angle += diff;

    a.vx = Math.cos(a.angle) * MAX_SPEED;
    a.vy = Math.sin(a.angle) * MAX_SPEED;

    a.x += a.vx;
    a.y += a.vy;
}

// =====================
// DRAW
// =====================
function drawAircraft(a){
    ctx.save();
    ctx.translate(a.x,a.y);
    ctx.rotate(a.angle);

    ctx.fillStyle="cyan";

    ctx.beginPath();
    ctx.moveTo(12,0);
    ctx.lineTo(-8,5);
    ctx.lineTo(-8,-5);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

function drawTurret(){
    ctx.fillStyle="gray";
    ctx.beginPath();
    ctx.arc(turret.x,turret.y,15,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="white";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(turret.x,turret.y);
    ctx.lineTo(
        turret.x + Math.cos(turret.angle)*40,
        turret.y + Math.sin(turret.angle)*40
    );
    ctx.stroke();
}

function drawBullets(){
    ctx.strokeStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.moveTo(b.x,b.y);
        ctx.lineTo(b.x - b.vx*2, b.y - b.vy*2);
        ctx.stroke();
    });
}

function drawExplosions(){
    explosions.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
        ctx.strokeStyle="orange";
        ctx.stroke();
    });
}

// =====================
// TARGETING
// =====================
function getLeadTarget(a){
    const dx = a.x - turret.x;
    const dy = a.y - turret.y;
    const dist = Math.hypot(dx,dy);
    const t = dist / BULLET_SPEED;

    return {
        x: a.x + a.vx*t,
        y: a.y + a.vy*t
    };
}

function getClosestTarget(){
    let best=null, min=Infinity;

    aircrafts.forEach(a=>{
        let d=Math.hypot(a.x-turret.x,a.y-turret.y);
        if(d<min){
            min=d;
            best=a;
        }
    });

    return best;
}

// =====================
// UPDATE
// =====================
function updateAircraft(){
    aircrafts.forEach(updateSteering);
}

function updateTurret(){
    let target = getClosestTarget();
    if(!target) return;

    let lead = getLeadTarget(target);
    turret.angle = Math.atan2(lead.y - turret.y, lead.x - turret.x);
}

function shoot(){
    let target = getClosestTarget();
    if(!target) return;

    bullets.push({
        x: turret.x,
        y: turret.y,
        vx: Math.cos(turret.angle)*BULLET_SPEED,
        vy: Math.sin(turret.angle)*BULLET_SPEED
    });
}

// =====================
// COLLISION
// =====================
function updateBullets(){
    bullets.forEach(b=>{
        b.x+=b.vx;
        b.y+=b.vy;

        aircrafts = aircrafts.filter(a=>{
            if(Math.hypot(b.x-a.x,b.y-a.y)<12){
                explosions.push({x:a.x,y:a.y,radius:4});
                return false;
            }
            return true;
        });
    });

    bullets = bullets.filter(b=>
        b.x>0 && b.x<window.innerWidth &&
        b.y>0 && b.y<window.innerHeight
    );
}

function updateExplosions(){
    explosions.forEach(e=>e.radius+=1.2);
    explosions = explosions.filter(e=>e.radius<15);
}

// =====================
// HELPERS
// =====================
function normalizeAngle(a){
    return Math.atan2(Math.sin(a), Math.cos(a));
}

// =====================
// LOOP
// =====================
let spawnTimer=0;
let shootTimer=0;

function animate(){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);

    spawnTimer++;
    if(spawnTimer > SPAWN_INTERVAL){
        spawnAircraft();
        spawnTimer = 0;
    }

    updateAircraft();
    updateTurret();
    updateBullets();
    updateExplosions();

    aircrafts.forEach(drawAircraft);
    drawTurret();
    drawBullets();
    drawExplosions();

    shootTimer++;
    if(shootTimer > 18){
        shoot();
        shootTimer = 0;
    }

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
