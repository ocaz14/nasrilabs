<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Predator Prey - Clean Render</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="info">
    Predator: <span id="predCount"></span><br>
    Prey: <span id="preyCount"></span><br>
    Debug: Press D
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let DEBUG = false;

window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "d") DEBUG = !DEBUG;
});

// ================= VECTOR =================
class Vector {
    constructor(x,y){ this.x=x; this.y=y; }
    add(v){ this.x+=v.x; this.y+=v.y; return this; }
    sub(v){ this.x-=v.x; this.y-=v.y; return this; }
    mult(n){ this.x*=n; this.y*=n; return this; }
    div(n){ this.x/=n; this.y/=n; return this; }
    mag(){ return Math.sqrt(this.x*this.x + this.y*this.y); }
    normalize(){ let m=this.mag(); if(m) this.div(m); return this; }
    limit(max){ if(this.mag()>max){ this.normalize().mult(max);} return this;}
    copy(){ return new Vector(this.x,this.y); }
    static sub(a,b){ return new Vector(a.x-b.x,a.y-b.y); }
    static random2D(){
        let a=Math.random()*Math.PI*2;
        return new Vector(Math.cos(a), Math.sin(a));
    }
}

// ================= BASE =================
class Agent {
    constructor(x,y){
        this.pos = new Vector(x,y);
        this.vel = Vector.random2D();
        this.acc = new Vector(0,0);
        this.maxSpeed = 2;
        this.maxForce = 0.1;
    }

    applyForce(f){ this.acc.add(f); }

    update(){
        this.vel.add(this.acc);
        this.vel.limit(this.maxSpeed);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.wrap();
    }

    wrap(){
        if(this.pos.x > canvas.width) this.pos.x = 0;
        if(this.pos.x < 0) this.pos.x = canvas.width;
        if(this.pos.y > canvas.height) this.pos.y = 0;
        if(this.pos.y < 0) this.pos.y = canvas.height;
    }

    seek(target){
        let desired = Vector.sub(target, this.pos);
        desired.normalize().mult(this.maxSpeed);
        let steer = Vector.sub(desired, this.vel);
        return steer.limit(this.maxForce);
    }

    flee(target){
        let desired = Vector.sub(this.pos, target);
        let d = desired.mag();
        if(d < 100){
            desired.normalize().mult(this.maxSpeed);
            let steer = Vector.sub(desired, this.vel);
            return steer.limit(this.maxForce*2);
        }
        return new Vector(0,0);
    }

    separation(agents){
        let desired = 20;
        let steer = new Vector(0,0);
        let count = 0;

        agents.forEach(other=>{
            let d = Vector.sub(this.pos, other.pos).mag();
            if(other!==this && d<desired && d>0){
                let diff = Vector.sub(this.pos, other.pos);
                diff.normalize().div(d);
                steer.add(diff);
                count++;
            }
        });

        if(count>0) steer.div(count);

        if(steer.mag()>0){
            steer.normalize().mult(this.maxSpeed);
            steer.sub(this.vel);
            steer.limit(this.maxForce);
        }

        return steer;
    }

    inVision(target, angle=Math.PI/3, dist=120){
        let dir = this.vel.copy().normalize();
        let to = Vector.sub(target,this.pos);

        if(to.mag() > dist) return false;

        to.normalize();
        let dot = dir.x*to.x + dir.y*to.y;
        return Math.acos(dot) < angle;
    }

    predict(pos, vel, factor=8){
        return pos.copy().add(vel.copy().mult(factor));
    }

    wander(){
        return Vector.random2D().mult(0.05);
    }
}

// ================= PREY =================
class Prey extends Agent {
    constructor(x,y){
        super(x,y);
        this.baseSpeed = 2.5;
    }

    behave(predators, preys){
        let fleeForce = new Vector(0,0);
        let panic = false;

        predators.forEach(p=>{
            let d = Vector.sub(this.pos, p.pos).mag();
            if(d < 60) panic = true;
            fleeForce.add(this.flee(p.pos));
        });

        this.maxSpeed = panic ? 4 : this.baseSpeed;

        let sep = this.separation(preys).mult(0.8);

        this.applyForce(fleeForce);
        this.applyForce(sep);
    }

    draw(){
        let angle = Math.atan2(this.vel.y, this.vel.x);

        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.moveTo(8,0);
        ctx.lineTo(-5,4);
        ctx.lineTo(-5,-4);
        ctx.closePath();

        ctx.fillStyle = "#22c55e";
        ctx.fill();

        ctx.restore();
    }
}

// ================= PREDATOR =================
class Predator extends Agent {
    constructor(x,y){
        super(x,y);
        this.maxSpeed = 3;
        this.energy = 120;
        this.memory = null;
        this.memoryTimer = 0;
    }

    behave(preys){
        let closest=null, minDist=Infinity;

        preys.forEach(p=>{
            let d = Vector.sub(p.pos,this.pos).mag();
            if(this.inVision(p.pos) && d<minDist){
                minDist=d;
                closest=p;
            }
        });

        if(closest){
            this.memory = closest.pos.copy();
            this.memoryTimer = 120;

            let future = this.predict(closest.pos, closest.vel);
            this.applyForce(this.seek(future));

            if(minDist < 6){
                let i = preys.indexOf(closest);
                if(i>-1) preys.splice(i,1);
                this.energy += 80;
            }
        }
        else if(this.memory && this.memoryTimer>0){
            this.applyForce(this.seek(this.memory));
            this.memoryTimer--;
        }

        this.applyForce(this.wander());
        this.energy -= 0.25;
    }

    draw(){
        let angle = Math.atan2(this.vel.y, this.vel.x);

        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.moveTo(10,0);
        ctx.lineTo(-6,5);
        ctx.lineTo(-6,-5);
        ctx.closePath();

        ctx.fillStyle = "#ef4444";
        ctx.fill();

        ctx.restore();

        if(DEBUG){
            ctx.strokeStyle="rgba(255,255,255,0.1)";
            ctx.beginPath();
            ctx.arc(this.pos.x,this.pos.y,120,angle-Math.PI/3,angle+Math.PI/3);
            ctx.stroke();
        }
    }
}

// ================= INIT =================
let preys=[], predators=[];

for(let i=0;i<80;i++){
    preys.push(new Prey(Math.random()*canvas.width, Math.random()*canvas.height));
}
for(let i=0;i<8;i++){
    predators.push(new Predator(Math.random()*canvas.width, Math.random()*canvas.height));
}

// ================= LOOP =================
function animate(){

    // 🔥 CLEAN FRAME (NO TRAIL)
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // redraw background
    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    preys.forEach(p=>{
        p.behave(predators,preys);
        p.update();
        p.draw();

        let density = 1 - (preys.length / 600);
        if(preys.length < 600 && Math.random() < 0.002 * density){
            preys.push(new Prey(p.pos.x,p.pos.y));
        }
    });

    predators = predators.filter(pred=>{
        pred.behave(preys);
        pred.update();
        pred.draw();
        return pred.energy > 0;
    });

    if(predators.length < preys.length/50 && Math.random()<0.01){
        predators.push(new Predator(Math.random()*canvas.width, Math.random()*canvas.height));
    }

    document.getElementById("preyCount").innerText = preys.length;
    document.getElementById("predCount").innerText = predators.length;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
