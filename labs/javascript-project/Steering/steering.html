<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Steering Behavior Simulation</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0f172a;
        font-family: Arial, sans-serif;
        color: white;
    }
    #info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.4);
        padding: 10px;
        border-radius: 8px;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="info">
    Move mouse → Seek<br>
    Click → Toggle Wander
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ================= VECTOR =================
class Vector {
    constructor(x, y) {
        this.x = x;
        this.y = y;
    }

    add(v) {
        this.x += v.x;
        this.y += v.y;
        return this;
    }

    sub(v) {
        this.x -= v.x;
        this.y -= v.y;
        return this;
    }

    mult(n) {
        this.x *= n;
        this.y *= n;
        return this;
    }

    div(n) {
        this.x /= n;
        this.y /= n;
        return this;
    }

    mag() {
        return Math.sqrt(this.x * this.x + this.y * this.y);
    }

    normalize() {
        let m = this.mag();
        if (m !== 0) this.div(m);
        return this;
    }

    limit(max) {
        if (this.mag() > max) {
            this.normalize();
            this.mult(max);
        }
        return this;
    }

    copy() {
        return new Vector(this.x, this.y);
    }

    static sub(a, b) {
        return new Vector(a.x - b.x, a.y - b.y);
    }

    static random2D() {
        let angle = Math.random() * Math.PI * 2;
        return new Vector(Math.cos(angle), Math.sin(angle));
    }
}

// ================= AGENT =================
class Agent {
    constructor(x, y) {
        this.position = new Vector(x, y);
        this.velocity = Vector.random2D();
        this.acceleration = new Vector(0, 0);

        this.maxSpeed = 3;
        this.maxForce = 0.1;

        this.wanderAngle = 0;
    }

    applyForce(force) {
        this.acceleration.add(force);
    }

    seek(target) {
        let desired = Vector.sub(target, this.position);
        desired.normalize();
        desired.mult(this.maxSpeed);

        let steering = Vector.sub(desired, this.velocity);
        steering.limit(this.maxForce);

        return steering;
    }

    wander() {
        let wanderRadius = 50;
        let wanderDistance = 80;
        let change = 0.3;

        this.wanderAngle += (Math.random() * 2 - 1) * change;

        let circleCenter = this.velocity.copy().normalize().mult(wanderDistance);
        let displacement = new Vector(
            Math.cos(this.wanderAngle),
            Math.sin(this.wanderAngle)
        ).mult(wanderRadius);

        return circleCenter.add(displacement).limit(this.maxForce);
    }

    update() {
        this.velocity.add(this.acceleration);
        this.velocity.limit(this.maxSpeed);
        this.position.add(this.velocity);
        this.acceleration.mult(0);
    }

    edges() {
        if (this.position.x > canvas.width) this.position.x = 0;
        if (this.position.x < 0) this.position.x = canvas.width;
        if (this.position.y > canvas.height) this.position.y = 0;
        if (this.position.y < 0) this.position.y = canvas.height;
    }

    draw() {
        ctx.save();
        ctx.translate(this.position.x, this.position.y);

        let angle = Math.atan2(this.velocity.y, this.velocity.x);
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.moveTo(15, 0);
        ctx.lineTo(-10, 6);
        ctx.lineTo(-10, -6);
        ctx.closePath();

        ctx.fillStyle = "#38bdf8";
        ctx.fill();
        ctx.restore();
    }
}

// ================= SETUP =================
let agent = new Agent(canvas.width / 2, canvas.height / 2);
let mouse = new Vector(canvas.width / 2, canvas.height / 2);
let wanderMode = false;

canvas.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

canvas.addEventListener("click", () => {
    wanderMode = !wanderMode;
});

// ================= LOOP =================
function animate() {
    ctx.fillStyle = "rgba(15, 23, 42, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let force;

    if (wanderMode) {
        force = agent.wander();
    } else {
        force = agent.seek(mouse);
    }

    agent.applyForce(force);
    agent.update();
    agent.edges();
    agent.draw();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
