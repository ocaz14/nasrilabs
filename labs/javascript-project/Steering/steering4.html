<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Predator Prey - Advanced AI</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="info">
    Predator: <span id="predCount"></span><br>
    Prey: <span id="preyCount"></span><br>
    Debug: Press D
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let DEBUG = false;

window.addEventListener("keydown", e => {
    if (e.key.toLowerCase() === "d") DEBUG = !DEBUG;
});

// ================= VECTOR =================
class Vector {
    constructor(x, y) { this.x = x; this.y = y; }
    add(v){ this.x+=v.x; this.y+=v.y; return this; }
    sub(v){ this.x-=v.x; this.y-=v.y; return this; }
    mult(n){ this.x*=n; this.y*=n; return this; }
    div(n){ this.x/=n; this.y/=n; return this; }
    mag(){ return Math.sqrt(this.x*this.x + this.y*this.y); }
    normalize(){ let m=this.mag(); if(m) this.div(m); return this;}
    limit(max){ if(this.mag()>max){ this.normalize().mult(max);} return this;}
    copy(){ return new Vector(this.x,this.y); }
    static sub(a,b){ return new Vector(a.x-b.x, a.y-b.y); }
    static random2D(){
        let a=Math.random()*Math.PI*2;
        return new Vector(Math.cos(a), Math.sin(a));
    }
}

// ================= BASE AGENT =================
class Agent {
    constructor(x,y){
        this.pos = new Vector(x,y);
        this.vel = Vector.random2D();
        this.acc = new Vector(0,0);
        this.maxSpeed = 2;
        this.maxForce = 0.1;
    }

    applyForce(f){ this.acc.add(f); }

    update(){
        this.vel.add(this.acc);
        this.vel.limit(this.maxSpeed);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.edges();
    }

    edges(){
        if(this.pos.x>canvas.width) this.pos.x=0;
        if(this.pos.x<0) this.pos.x=canvas.width;
        if(this.pos.y>canvas.height) this.pos.y=0;
        if(this.pos.y<0) this.pos.y=canvas.height;
    }

    seek(target){
        let desired = Vector.sub(target, this.pos);
        desired.normalize().mult(this.maxSpeed);
        let steer = Vector.sub(desired, this.vel);
        return steer.limit(this.maxForce);
    }

    flee(target){
        let desired = Vector.sub(this.pos, target);
        let d = desired.mag();
        if(d < 100){
            desired.normalize().mult(this.maxSpeed);
            let steer = Vector.sub(desired, this.vel);
            return steer.limit(this.maxForce * 2);
        }
        return new Vector(0,0);
    }

    // ===== Separation =====
    separation(agents){
        let desiredSeparation = 20;
        let steer = new Vector(0,0);
        let count = 0;

        agents.forEach(other=>{
            let d = Vector.sub(this.pos, other.pos).mag();
            if(other !== this && d < desiredSeparation && d > 0){
                let diff = Vector.sub(this.pos, other.pos);
                diff.normalize();
                diff.div(d);
                steer.add(diff);
                count++;
            }
        });

        if(count>0) steer.div(count);

        if(steer.mag()>0){
            steer.normalize().mult(this.maxSpeed);
            steer.sub(this.vel);
            steer.limit(this.maxForce);
        }

        return steer;
    }

    // ===== Vision Cone =====
    inVision(target, angle = Math.PI/3, distance = 120){
        let dir = this.vel.copy().normalize();
        let toTarget = Vector.sub(target, this.pos);

        let d = toTarget.mag();
        if(d > distance) return false;

        toTarget.normalize();

        let dot = dir.x * toTarget.x + dir.y * toTarget.y;
        let theta = Math.acos(dot);

        return theta < angle;
    }

    // ===== Predict Future Position =====
    predict(targetPos, targetVel, factor = 8){
        let future = targetVel.copy().mult(factor);
        return targetPos.copy().add(future);
    }

    wander(){
        return Vector.random2D().mult(0.05);
    }
}

// ================= PREY =================
class Prey extends Agent {
    constructor(x,y){
        super(x,y);
        this.baseSpeed = 2.5;
        this.maxSpeed = this.baseSpeed;
    }

    behave(predators, preys){
        let fleeForce = new Vector(0,0);
        let panic = false;

        predators.forEach(p=>{
            let d = Vector.sub(this.pos, p.pos).mag();
            if(d < 60) panic = true;
            fleeForce.add(this.flee(p.pos));
        });

        // panic speed boost
        this.maxSpeed = panic ? 4 : this.baseSpeed;

        let sep = this.separation(preys).mult(0.8);

        this.applyForce(fleeForce);
        this.applyForce(sep);
    }

    draw(){
        ctx.fillStyle = "#22c55e";
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, 4, 0, Math.PI*2);
        ctx.fill();
    }
}

// ================= PREDATOR =================
class Predator extends Agent {
    constructor(x,y){
        super(x,y);
        this.maxSpeed = 3;
        this.energy = 120;

        this.memory = null;
        this.memoryTimer = 0;
    }

    behave(preys){
        let closest = null;
        let minDist = Infinity;

        preys.forEach(p=>{
            let d = Vector.sub(p.pos, this.pos).mag();

            if(this.inVision(p.pos) && d < minDist){
                minDist = d;
                closest = p;
            }
        });

        if(closest){
            this.memory = closest.pos.copy();
            this.memoryTimer = 120;

            let future = this.predict(closest.pos, closest.vel, 8);
            let force = this.seek(future);

            this.applyForce(force);

            if(minDist < 6){
                let index = preys.indexOf(closest);
                if(index > -1) preys.splice(index,1);
                this.energy += 80;
            }
        } 
        else if(this.memory && this.memoryTimer > 0){
            let force = this.seek(this.memory);
            this.applyForce(force);
            this.memoryTimer--;
        }

        // slight wander
        this.applyForce(this.wander());

        this.energy -= 0.25;
    }

    draw(){
        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, 6, 0, Math.PI*2);
        ctx.fill();

        if(DEBUG){
            let angle = Math.atan2(this.vel.y, this.vel.x);

            // vision cone
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.beginPath();
            ctx.arc(this.pos.x, this.pos.y, 120, angle - Math.PI/3, angle + Math.PI/3);
            ctx.stroke();

            // memory point
            if(this.memory){
                ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(this.memory.x, this.memory.y, 3, 0, Math.PI*2);
                ctx.fill();
            }
        }
    }
}

// ================= SETUP =================
let preys = [];
let predators = [];

for(let i=0;i<60;i++){
    preys.push(new Prey(Math.random()*canvas.width, Math.random()*canvas.height));
}

for(let i=0;i<8;i++){
    predators.push(new Predator(Math.random()*canvas.width, Math.random()*canvas.height));
}

// ================= LOOP =================
function animate(){
    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    preys.forEach(p=>{
        p.behave(predators, preys);
        p.update();
        p.draw();

        if(Math.random() < 0.0015){
            preys.push(new Prey(p.pos.x, p.pos.y));
        }
    });

    predators = predators.filter(pred=>{
        pred.behave(preys);
        pred.update();
        pred.draw();
        return pred.energy > 0;
    });

    if(Math.random() < 0.004){
        predators.push(new Predator(Math.random()*canvas.width, Math.random()*canvas.height));
    }

    document.getElementById("preyCount").innerText = preys.length;
    document.getElementById("predCount").innerText = predators.length;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
