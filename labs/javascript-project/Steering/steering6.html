<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Predator Prey - Color Lock Debug</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0f172a;
    color: white;
    font-family: Arial, sans-serif;
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="info">
    Predator: <span id="predCount"></span><br>
    Prey: <span id="preyCount"></span><br>
    Debug: Press D
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let DEBUG = false;
window.addEventListener("keydown", e=>{
    if(e.key.toLowerCase()==="d") DEBUG=!DEBUG;
});

// ================= VECTOR =================
class Vector {
    constructor(x,y){ this.x=x; this.y=y; }
    add(v){ this.x+=v.x; this.y+=v.y; return this; }
    sub(v){ this.x-=v.x; this.y-=v.y; return this; }
    mult(n){ this.x*=n; this.y*=n; return this; }
    div(n){ this.x/=n; this.y/=n; return this; }
    mag(){ return Math.sqrt(this.x*this.x + this.y*this.y); }
    normalize(){ let m=this.mag(); if(m) this.div(m); return this;}
    limit(max){ if(this.mag()>max){ this.normalize().mult(max);} return this;}
    copy(){ return new Vector(this.x,this.y); }
    static sub(a,b){ return new Vector(a.x-b.x,a.y-b.y); }
    static random2D(){
        let a=Math.random()*Math.PI*2;
        return new Vector(Math.cos(a),Math.sin(a));
    }
}

// ================= BASE =================
class Agent {
    constructor(x,y,speedGene=1,visionGene=1){
        this.pos = new Vector(x,y);
        this.vel = Vector.random2D();
        this.acc = new Vector(0,0);

        this.speedGene = speedGene;
        this.visionGene = visionGene;

        this.baseSpeed = 2;
        this.maxSpeed = this.baseSpeed * this.speedGene;
        this.maxForce = 0.1;

        this.visionRange = 120 * this.visionGene;
    }

    applyForce(f){ this.acc.add(f); }

    update(){
        this.vel.add(this.acc);
        this.vel.limit(this.maxSpeed);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.wrap();
    }

    wrap(){
        if(this.pos.x>canvas.width) this.pos.x=0;
        if(this.pos.x<0) this.pos.x=canvas.width;
        if(this.pos.y>canvas.height) this.pos.y=0;
        if(this.pos.y<0) this.pos.y=canvas.height;
    }

    seek(target){
        let desired = Vector.sub(target,this.pos);
        desired.normalize().mult(this.maxSpeed);
        let steer = Vector.sub(desired,this.vel);
        return steer.limit(this.maxForce);
    }

    flee(target){
        let desired = Vector.sub(this.pos,target);
        let d = desired.mag();
        if(d < this.visionRange){
            desired.normalize().mult(this.maxSpeed);
            let steer = Vector.sub(desired,this.vel);
            return steer.limit(this.maxForce*2);
        }
        return new Vector(0,0);
    }

    separation(agents){
        let desired=20, steer=new Vector(0,0), count=0;

        agents.forEach(o=>{
            let d = Vector.sub(this.pos,o.pos).mag();
            if(o!==this && d<desired && d>0){
                let diff = Vector.sub(this.pos,o.pos);
                diff.normalize().div(d);
                steer.add(diff);
                count++;
            }
        });

        if(count>0) steer.div(count);

        if(steer.mag()>0){
            steer.normalize().mult(this.maxSpeed);
            steer.sub(this.vel);
            steer.limit(this.maxForce);
        }

        return steer;
    }

    inVision(target, angle=Math.PI/3){
        let dir = this.vel.copy().normalize();
        let to = Vector.sub(target,this.pos);

        if(to.mag()>this.visionRange) return false;

        to.normalize();
        let dot = dir.x*to.x + dir.y*to.y;
        return Math.acos(dot) < angle;
    }

    predict(pos,vel,f=8){
        return pos.copy().add(vel.copy().mult(f));
    }

    wander(){
        return Vector.random2D().mult(0.05);
    }
}

// ================= PREY =================
class Prey extends Agent {
    constructor(x,y,speed,vision){
        super(x,y,speed,vision);
        this.baseSpeed=2.5;
        this.isTargeted = false; // 🔥 status lock
    }

    behave(predators,preys){
        this.isTargeted = false; // reset setiap frame

        let fleeForce=new Vector(0,0), panic=false;

        predators.forEach(p=>{
            let d=Vector.sub(this.pos,p.pos).mag();
            if(d<60) panic=true;
            fleeForce.add(this.flee(p.pos));
        });

        this.maxSpeed=(panic?4:this.baseSpeed)*this.speedGene;

        let sep=this.separation(preys).mult(0.8);

        this.applyForce(fleeForce);
        this.applyForce(sep);
    }

    draw(){
        let a=Math.atan2(this.vel.y,this.vel.x);

        ctx.save();
        ctx.translate(this.pos.x,this.pos.y);
        ctx.rotate(a);

        ctx.beginPath();
        ctx.moveTo(8,0);
        ctx.lineTo(-5,4);
        ctx.lineTo(-5,-4);
        ctx.closePath();

        if(DEBUG && this.isTargeted){
            ctx.fillStyle = "yellow"; // 🔥 highlight target
        } else {
            let g=Math.min(255,100+this.speedGene*80);
            ctx.fillStyle=`rgb(0,${g},100)`;
        }

        ctx.fill();
        ctx.restore();
    }
}

// ================= PREDATOR =================
class Predator extends Agent {
    constructor(x,y,speed,vision){
        super(x,y,speed,vision);
        this.maxSpeed=3*this.speedGene;
        this.energy=120;
        this.memory=null;
        this.memoryTimer=0;
        this.currentTarget=null;
    }

    behave(preys){
        let closest=null, minDist=Infinity;

        preys.forEach(p=>{
            let d=Vector.sub(p.pos,this.pos).mag();
            if(this.inVision(p.pos)&&d<minDist){
                minDist=d;
                closest=p;
            }
        });

        this.currentTarget = closest;

        if(closest){
            closest.isTargeted = true; // 🔥 tandai prey

            this.memory=closest.pos.copy();
            this.memoryTimer=120;

            let future=this.predict(closest.pos,closest.vel);
            this.applyForce(this.seek(future));

            if(minDist<6){
                let i=preys.indexOf(closest);
                if(i>-1) preys.splice(i,1);
                this.energy+=80;
            }
        }
        else if(this.memory && this.memoryTimer>0){
            this.applyForce(this.seek(this.memory));
            this.memoryTimer--;
        }

        this.applyForce(this.wander());
        this.energy-=0.25;
    }

    draw(){
        let a=Math.atan2(this.vel.y,this.vel.x);

        ctx.save();
        ctx.translate(this.pos.x,this.pos.y);
        ctx.rotate(a);

        ctx.beginPath();
        ctx.moveTo(10,0);
        ctx.lineTo(-6,5);
        ctx.lineTo(-6,-5);
        ctx.closePath();

        let r=Math.min(255,100+this.speedGene*80);
        ctx.fillStyle=`rgb(${r},50,50)`;
        ctx.fill();

        ctx.restore();

        if(DEBUG){
            ctx.strokeStyle="rgba(255,255,255,0.15)";
            ctx.beginPath();
            ctx.arc(this.pos.x,this.pos.y,this.visionRange,a-Math.PI/3,a+Math.PI/3);
            ctx.stroke();

            if(this.memory){
                ctx.fillStyle="yellow";
                ctx.beginPath();
                ctx.arc(this.memory.x,this.memory.y,3,0,Math.PI*2);
                ctx.fill();
            }
        }
    }
}

// ================= REPRODUCTION =================
function reproduce(parent){
    let mutate=g=>{
        let m=g+(Math.random()*0.2-0.1);
        return Math.max(0.5,Math.min(2,m));
    };
    return {
        speed:mutate(parent.speedGene),
        vision:mutate(parent.visionGene)
    };
}

// ================= INIT =================
let preys=[],predators=[];

for(let i=0;i<80;i++){
    preys.push(new Prey(Math.random()*canvas.width,Math.random()*canvas.height,1,1));
}
for(let i=0;i<8;i++){
    predators.push(new Predator(Math.random()*canvas.width,Math.random()*canvas.height,1,1));
}

// ================= LOOP =================
function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#0f172a";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    preys.forEach(p=>{
        p.behave(predators,preys);
        p.update();
        p.draw();

        let density=1-(preys.length/600);
        if(preys.length<600 && Math.random()<0.002*density){
            let g=reproduce(p);
            preys.push(new Prey(p.pos.x,p.pos.y,g.speed,g.vision));
        }
    });

    predators=predators.filter(pred=>{
        pred.behave(preys);
        pred.update();
        pred.draw();

        if(pred.energy>0){
            if(Math.random()<0.002){
                let g=reproduce(pred);
                predators.push(new Predator(pred.pos.x,pred.pos.y,g.speed,g.vision));
            }
            return true;
        }
        return false;
    });

    document.getElementById("preyCount").innerText=preys.length;
    document.getElementById("predCount").innerText=predators.length;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
