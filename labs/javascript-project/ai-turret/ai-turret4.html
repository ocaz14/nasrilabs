<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:#0b0f1a; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// =====================
let lastTime = performance.now();

// =====================
const POP = 8;
const GEN_TIME = 15;
const BULLET_SPEED = 400;
const FIRE_RATE = 5; // 🔥 HALF SPEED
const FIRE_INTERVAL = 1 / FIRE_RATE;
const TURN_SPEED = Math.PI / 2;
const AIRCRAFT_COUNT = 20;
const BARREL_LENGTH = 40;

// =====================
function randDNA(){
  return {
    lead: 0.8 + Math.random()*0.6,
    aimNoise: Math.random()*0.1
  };
}

function mutate(d){
  return {
    lead: d.lead + (Math.random()-0.5)*0.2,
    aimNoise: Math.max(0, d.aimNoise + (Math.random()-0.5)*0.05)
  };
}

// =====================
let turrets = [];
let bullets = [];
let aircrafts = [];
let gen = 1;
let timeAlive = 0;

// =====================
// INIT
// =====================
function init(){
  turrets = [];

  for(let i=0;i<POP;i++){
    turrets.push({
      dna: randDNA(),
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      angle: Math.random()*Math.PI*2,
      fireTimer: 0,
      score: 0,
      shots: 0,
      fitness: 0
    });
  }
}

// =====================
// AIRCRAFT
// =====================
function spawnAircraft(){
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height;
  let angle = Math.random()*Math.PI*2;

  aircrafts.push({
    x,y,
    vx: Math.cos(angle)*100,
    vy: Math.sin(angle)*100,
    angle
  });
}

function initAircrafts(){
  aircrafts = [];
  for(let i=0;i<AIRCRAFT_COUNT;i++){
    spawnAircraft();
  }
}

function updateAircraft(dt){
  aircrafts.forEach(a=>{
    a.vx += (Math.random()-0.5)*50 * dt;
    a.vy += (Math.random()-0.5)*50 * dt;

    let speed = Math.hypot(a.vx,a.vy);
    if(speed > 100){
      a.vx = (a.vx/speed)*100;
      a.vy = (a.vy/speed)*100;
    }

    a.angle = Math.atan2(a.vy,a.vx);

    a.x += a.vx * dt;
    a.y += a.vy * dt;

    if(a.x<0||a.x>canvas.width) a.vx*=-1;
    if(a.y<0||a.y>canvas.height) a.vy*=-1;
  });
}

// =====================
// BULLETS
// =====================
function shoot(t){
  let bx = t.x + Math.cos(t.angle)*BARREL_LENGTH;
  let by = t.y + Math.sin(t.angle)*BARREL_LENGTH;

  bullets.push({
    x: bx,
    y: by,
    vx: Math.cos(t.angle)*BULLET_SPEED,
    vy: Math.sin(t.angle)*BULLET_SPEED,
    owner: t
  });

  t.shots++;
}

function updateBullets(dt){
  for(let i = bullets.length - 1; i >= 0; i--){
    let b = bullets[i];

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    let remove = false;

    for(let j=0;j<aircrafts.length;j++){
      let a = aircrafts[j];

      if(Math.hypot(b.x-a.x,b.y-a.y) < 10){
        b.owner.score++;

        a.x = Math.random()*canvas.width;
        a.y = Math.random()*canvas.height;

        remove = true;
        break;
      }
    }

    if(
      remove ||
      b.x<0||b.x>canvas.width||
      b.y<0||b.y>canvas.height
    ){
      bullets.splice(i,1);
    }
  }
}

// =====================
// TARGET SELECTION
// =====================
function getClosestTarget(t){
  let best = null;
  let min = Infinity;

  aircrafts.forEach(a=>{
    let d = Math.hypot(a.x - t.x, a.y - t.y);
    if(d < min){
      min = d;
      best = a;
    }
  });

  return best;
}

// =====================
// TURRET
// =====================
function updateTurrets(dt){
  turrets.forEach(t=>{

    let target = getClosestTarget(t);
    if(!target) return;

    let dx = target.x - t.x;
    let dy = target.y - t.y;
    let dist = Math.hypot(dx,dy);

    let tHit = dist / BULLET_SPEED;

    let tx = target.x + target.vx*tHit*t.dna.lead;
    let ty = target.y + target.vy*tHit*t.dna.lead;

    let desired = Math.atan2(ty - t.y, tx - t.x);
    desired += (Math.random()-0.5)*t.dna.aimNoise;

    let diff = normalize(desired - t.angle);

    let maxTurn = TURN_SPEED * dt;
    diff = Math.max(-maxTurn, Math.min(maxTurn, diff));

    t.angle += diff;

    t.fireTimer -= dt;

    if(t.fireTimer <= 0 && Math.abs(diff) < 0.2){
      shoot(t);
      t.fireTimer = FIRE_INTERVAL;
    }
  });
}

// =====================
// EVOLUTION
// =====================
function evolve(){
  turrets.forEach(t=>{
    t.fitness = t.score - t.shots*0.3;
  });

  turrets.sort((a,b)=>b.fitness-a.fitness);

  let best = turrets.slice(0,3);

  let newPop = [];

  for(let i=0;i<POP;i++){
    let parent = best[Math.floor(Math.random()*best.length)];

    newPop.push({
      dna: mutate(parent.dna),
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      angle: Math.random()*Math.PI*2,
      fireTimer:0,
      score:0,
      shots:0,
      fitness:0
    });
  }

  turrets = newPop;
  bullets = [];
  gen++;
  timeAlive = 0;
  initAircrafts();
}

// =====================
// DRAW
// =====================
function drawAircraft(a){
  ctx.save();
  ctx.translate(a.x,a.y);
  ctx.rotate(a.angle);

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.moveTo(12,0);
  ctx.lineTo(-8,5);
  ctx.lineTo(-8,-5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawTurret(t){
  ctx.fillStyle="gray";
  ctx.beginPath();
  ctx.arc(t.x,t.y,12,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(t.x,t.y);
  ctx.lineTo(
    t.x + Math.cos(t.angle)*BARREL_LENGTH,
    t.y + Math.sin(t.angle)*BARREL_LENGTH
  );
  ctx.stroke();
}

function drawBullets(){
  ctx.strokeStyle="yellow";
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x - b.vx*0.02, b.y - b.vy*0.02);
    ctx.stroke();
  });
}

function drawUI(){
  let best = turrets[0] || {};
  let avg = turrets.reduce((s,t)=>s+(t.fitness||0),0)/turrets.length;

  ctx.fillStyle="white";
  ctx.font="12px monospace";

  ctx.fillText(`Gen: ${gen}`,10,20);
  ctx.fillText(`Best fitness: ${(best.fitness||0).toFixed(2)}`,10,40);
  ctx.fillText(`Avg fitness: ${avg.toFixed(2)}`,10,55);
}

// =====================
function normalize(a){
  return Math.atan2(Math.sin(a),Math.cos(a));
}

// =====================
function loop(now){
  let dt = (now - lastTime)/1000;
  lastTime = now;

  timeAlive += dt;

  updateAircraft(dt);
  updateTurrets(dt);
  updateBullets(dt);

  if(timeAlive > GEN_TIME){
    evolve();
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  aircrafts.forEach(drawAircraft);
  turrets.forEach(drawTurret);
  drawBullets();
  drawUI();

  requestAnimationFrame(loop);
}

init();
initAircrafts();
requestAnimationFrame(loop);
</script>
</body>
</html>
