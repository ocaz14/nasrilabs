<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:#0b0f1a; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// =====================
let lastTime = performance.now();

// =====================
const GEN_TIME = 15;
const BULLET_SPEED = 400;
const FIRE_RATE = 5;
const FIRE_INTERVAL = 1 / FIRE_RATE;
const TURN_SPEED = Math.PI / 2;
const AIRCRAFT_COUNT = 20;
const BARREL_LENGTH = 40;

// =====================
// DNA
// =====================
function randomDNA(){
  return {
    lead: 0.8 + Math.random()*0.6,
    aimNoise: Math.random()*0.1
  };
}

function mutate(d){
  return {
    lead: d.lead + (Math.random()-0.5)*0.2,
    aimNoise: Math.max(0, d.aimNoise + (Math.random()-0.5)*0.05)
  };
}

// =====================
// STATE
// =====================
let turret;
let currentDNA;
let bestDNA = randomDNA();

let currentScore = 0;
let bestScore = 0;

let gen = 1;
let timeAlive = 0;
let bullets = [];
let aircrafts = [];

function resetTurret(dna){
  turret = {
    x: canvas.width/2,
    y: canvas.height/2,
    angle: 0,
    fireTimer: 0,
    shots: 0,
    score: 0,
    dna: dna
  };
}

// =====================
// AIRCRAFT
// =====================
function spawnAircraft(){
  let x = Math.random()*canvas.width;
  let y = Math.random()*canvas.height;
  let angle = Math.random()*Math.PI*2;

  aircrafts.push({
    x,y,
    vx: Math.cos(angle)*100,
    vy: Math.sin(angle)*100,
    angle
  });
}

function initAircrafts(){
  aircrafts = [];
  for(let i=0;i<AIRCRAFT_COUNT;i++){
    spawnAircraft();
  }
}

function updateAircraft(dt){
  aircrafts.forEach(a=>{
    a.vx += (Math.random()-0.5)*50 * dt;
    a.vy += (Math.random()-0.5)*50 * dt;

    let speed = Math.hypot(a.vx,a.vy);
    if(speed > 100){
      a.vx = (a.vx/speed)*100;
      a.vy = (a.vy/speed)*100;
    }

    a.angle = Math.atan2(a.vy,a.vx);

    a.x += a.vx * dt;
    a.y += a.vy * dt;

    if(a.x<0||a.x>canvas.width) a.vx*=-1;
    if(a.y<0||a.y>canvas.height) a.vy*=-1;
  });
}

// =====================
// BULLETS
// =====================
function shoot(){
  let bx = turret.x + Math.cos(turret.angle)*BARREL_LENGTH;
  let by = turret.y + Math.sin(turret.angle)*BARREL_LENGTH;

  bullets.push({
    x: bx,
    y: by,
    vx: Math.cos(turret.angle)*BULLET_SPEED,
    vy: Math.sin(turret.angle)*BULLET_SPEED
  });

  turret.shots++;
}

function updateBullets(dt){
  for(let i = bullets.length - 1; i >= 0; i--){
    let b = bullets[i];

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    let remove = false;

    for(let j=0;j<aircrafts.length;j++){
      let a = aircrafts[j];

      if(Math.hypot(b.x-a.x,b.y-a.y) < 10){
        turret.score++;

        a.x = Math.random()*canvas.width;
        a.y = Math.random()*canvas.height;

        remove = true;
        break;
      }
    }

    if(
      remove ||
      b.x<0||b.x>canvas.width||
      b.y<0||b.y>canvas.height
    ){
      bullets.splice(i,1);
    }
  }
}

// =====================
// TARGET
// =====================
function getClosestTarget(){
  let best = null;
  let min = Infinity;

  aircrafts.forEach(a=>{
    let d = Math.hypot(a.x - turret.x, a.y - turret.y);
    if(d < min){
      min = d;
      best = a;
    }
  });

  return best;
}

// =====================
// TURRET
// =====================
function updateTurret(dt){

  let target = getClosestTarget();
  if(!target) return;

  let dx = target.x - turret.x;
  let dy = target.y - turret.y;
  let dist = Math.hypot(dx,dy);

  let tHit = dist / BULLET_SPEED;

  let tx = target.x + target.vx*tHit*turret.dna.lead;
  let ty = target.y + target.vy*tHit*turret.dna.lead;

  let desired = Math.atan2(ty - turret.y, tx - turret.x);
  desired += (Math.random()-0.5)*turret.dna.aimNoise;

  let diff = normalize(desired - turret.angle);

  let maxTurn = TURN_SPEED * dt;
  diff = Math.max(-maxTurn, Math.min(maxTurn, diff));

  turret.angle += diff;

  turret.fireTimer -= dt;

  if(turret.fireTimer <= 0 && Math.abs(diff) < 0.2){
    shoot();
    turret.fireTimer = FIRE_INTERVAL;
  }
}

// =====================
// EVOLUTION
// =====================
function evolve(){

  currentScore = turret.score - turret.shots*0.3;

  let improved = currentScore > bestScore;

  if(improved){
    bestScore = currentScore;
    bestDNA = currentDNA;
  }

  // next generation
  currentDNA = mutate(bestDNA);

  gen++;
  timeAlive = 0;
  bullets = [];

  resetTurret(currentDNA);
  initAircrafts();

  evolutionStatus = improved ? "IMPROVED ✅" : "worse ❌";
}

let evolutionStatus = "";

// =====================
// DRAW
// =====================
function drawAircraft(a){
  ctx.save();
  ctx.translate(a.x,a.y);
  ctx.rotate(a.angle);

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.moveTo(12,0);
  ctx.lineTo(-8,5);
  ctx.lineTo(-8,-5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawTurret(){
  ctx.fillStyle="gray";
  ctx.beginPath();
  ctx.arc(turret.x,turret.y,12,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(turret.x,turret.y);
  ctx.lineTo(
    turret.x + Math.cos(turret.angle)*BARREL_LENGTH,
    turret.y + Math.sin(turret.angle)*BARREL_LENGTH
  );
  ctx.stroke();
}

function drawBullets(){
  ctx.strokeStyle="yellow";
  bullets.forEach(b=>{
    ctx.beginPath();
    ctx.moveTo(b.x,b.y);
    ctx.lineTo(b.x - b.vx*0.02, b.y - b.vy*0.02);
    ctx.stroke();
  });
}

function drawUI(){
  ctx.fillStyle="white";
  ctx.font="12px monospace";

  ctx.fillText(`Gen: ${gen}`,10,20);
  ctx.fillText(`Score: ${currentScore.toFixed(2)}`,10,40);
  ctx.fillText(`Best: ${bestScore.toFixed(2)}`,10,55);

  ctx.fillText(`Status: ${evolutionStatus}`,10,75);

  ctx.fillText(`DNA current → lead:${currentDNA.lead.toFixed(2)} noise:${currentDNA.aimNoise.toFixed(2)}`,10,100);
  ctx.fillText(`DNA best → lead:${bestDNA.lead.toFixed(2)} noise:${bestDNA.aimNoise.toFixed(2)}`,10,115);
}

// =====================
function normalize(a){
  return Math.atan2(Math.sin(a),Math.cos(a));
}

// =====================
function loop(now){
  let dt = (now - lastTime)/1000;
  lastTime = now;

  timeAlive += dt;

  updateAircraft(dt);
  updateTurret(dt);
  updateBullets(dt);

  if(timeAlive > GEN_TIME){
    evolve();
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  aircrafts.forEach(drawAircraft);
  drawTurret();
  drawBullets();
  drawUI();

  requestAnimationFrame(loop);
}

// =====================
currentDNA = mutate(bestDNA);
resetTurret(currentDNA);
initAircrafts();
requestAnimationFrame(loop);

</script>
</body>
</html>
