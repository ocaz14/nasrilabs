<body>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <div class="hero-text">

    <!-- INPUT -->
    <div class="section">

        <div class="page">

            <h2>Add New Daily</h2>

            <p id="UTC" class="utc-clock">00 : 00 : 00</p>

            <div class="todo-input">

                <input
                    id="input"
                    type="text"
                    placeholder="Write your daily task..."
                >

                <div class="todo-time">

                    <input
                        id="hour"
                        type="number"

                    >

                    <span>:</span>

                </div>

                <button
                    class="btn neu"
                    onclick="submitTodolist()"
                >
                    Add Task
                </button>

            </div>

        </div>

    </div>

    <!-- LIST -->

    <div class="section">

        <div class="page">

            <h2>Your Daily List</h2>

            <p id="test"></p>

                id="display-todolist"

            </div>

</body>
  <script>
    var todolist = JSON.parse(localStorage.getItem("daily-todolist"));
    var daybefore = JSON.parse(localStorage.getItem("daybefore"));
    // var donelist = JSON.parse(localStorage.getItem("daily-donelist"));
    var utc = document.getElementById("UTC");
    var d = new Date();
    var hh = d.getHours();
    var mm = d.getMinutes();
    var ss = d.getSeconds();
    var dd = d.getDate();//day in month
    //var dd = d.getDay();//day in week

    var dailyrefresh;
    var test = document.getElementById("test");        

    if(daybefore == dd){
      dailyrefresh = 0;
    }else{
      dailyrefresh = 1;
      daybefore = dd;
    }        

    var timer = setInterval(function () {
      ss = ss + 1;

      if (ss == 60) {
        ss = 0;
        mm += 1;
      }
      if (mm == 60) {
        mm = 0;
        hh += 1;
      }
      if(hh == 24){
        hh = 0;
      }

      display_hh = make2dgt(hh);
      display_mm = make2dgt(mm);
      display_ss = make2dgt(ss);
      utc.innerText = display_hh + " : " + display_mm + " : " + display_ss;

      //reset list
      // if (hh === 10 && mm === 15 && ss === 0) {
      //   activeAll();
      //   location.reload();
      //   dailyrefresh = 0; 
      // }
      var timeNow      = hh * 3600 + mm * 60 + ss;
      var timeRefresh  = 0 * 3600 + 0 * 60 + 0;

      if (timeNow >= timeRefresh && dailyrefresh == 1) {
        activeAll();
        location.reload();
        dailyrefresh = 0;
      }
    }, 1000);

    if (todolist === null) {
      todolist = [];
      updateStorage();
    }

    displayTodolist();
    // if (donelist === null) {
    //   donelist = [];
    //   updateStorage();
    // }

    
    // displayDoneList();

    //Enter keyboard
    addEventListener("keyup", function (event) {
      if (event.keyCode === 13) {
        submitTodolist();
        console.log("enter");
      }
    });
    function submitTodolist() {
      var input = document.getElementById("input").value;
      var hour = document.getElementById("hour").value;
      var minute = document.getElementById("minute").value;
      var inputArray = [];
      if (input != "" && hour != "" && minute != "") {
        // todolist[todolist.length] = input;
        if (hour > 23 || hour < 0 || minute > 59 || minute < 0) {
          alert("masukkan format waktu dengan benar (00:00 - 23:59)");
        } else {
          inputArray[0] = input;
          inputArray[1] = hour;
          inputArray[2] = minute;
          inputArray[3] = "flex";
          todolist[todolist.length] = inputArray;
          document.getElementById("input").value = "";
          updateStorage();
          displayTodolist();
        }
      } else {
        alert("Pastikan tugas dan waktu terisi");
      }
    }
    function displayTodolist() {
      var list = [];
      todolist = todolist.sort(sortFunction);
      for (i = 0; i < todolist.length; i++) {
        var time_disp = todolist[i][1]  + " : " + todolist[i][2];
        var dailytask = todolist[i][0];
        var nav_display = todolist[i][3];

        var menitTersisa = (todolist[i][1] - hh) * 60 + (todolist[i][2] - mm);
        if (nav_display === "flex") {
          if (menitTersisa < 0) {
            var timerCol = "red";
          } else if (menitTersisa < 60) {
            var timerCol = "yellow";
          } else if (menitTersisa < 120) {
            var timerCol = "green";
          }
        } else {
          var timerCol = "normal";
        }

list[i] =
`
<div class="card neu todo-card">

    <div class="todo-time ${timerCol}">
        ${time_disp}
    </div>

    <div class="todo-text">
        ${dailytask}
    </div>

    <div class="todo-action" style="display:${nav_display}">
        <button class="btn btn-done" onclick="listDone(${i})">✓</button>

        <button class="btn btn-delete" onclick="listHapus(${i})">✕</button>
    </div>

</div>
`;

        // list[i] =
        //   "<div class='display-child'><div class='time-display " +
        //   timerCol +
        //   " '>" +
        //   time_disp +
        //   "</div><div id='list' class='list'><p>" +
        //   dailytask +
        //   "</p></div>" +
        //   "<div class='nav' style='display: " +
        //   nav_display +
        //   "'> " +
        //   "<div class='done' onclick='listDone(" +
        //   i +
        //   ")'><p>o</p></div>" +
        //   "<div class='delete' onclick='listHapus(" +
        //   i +
        //   ")'><p>x</p></div></div></div>";


      }
      var listReverse = list.reverse();
      document.getElementById("display-todolist").innerHTML = listReverse.join(
        ""
      );
    }
    // function displayDoneList() {
    //   var displayDoneList = [];
    //   for (i = 0; i < donelist.length; i++) {
    //     displayDoneList[i] =
    //       "<div class='display-child'>" +
    //       "<div id='list' class='list'><p>" +
    //       donelist[i] +
    //       "</p></div>" +
    //       "<div class='nav'>" +
    //       "<div class='delete' onclick='doneHapus(" +
    //       i +
    //       ")'><p>x</p></div></div></div> ";
    //   }
    //   var listReverse = displayDoneList.reverse();
    //   document.getElementById("done-list").innerHTML = listReverse.join("");
    // }
    function listHapus(i) {
      todolist.splice(i, 1);
      updateStorage();
      displayTodolist();
    }
    function listDone(i) {
      //   donelist[donelist.length] = todolist[i];
      todolist[i][3] = "none";
      displayTodolist();
      updateStorage();
      //   listHapus(i);
      //   displayDoneList();
    }
    // function doneHapus(i) {
    //   donelist.splice(i, 1);
    //   updateStorage();
    //   displayDoneList();
    // }
    function updateStorage() {
      localStorage.setItem("daily-todolist", JSON.stringify(todolist));
      localStorage.setItem("daybefore", JSON.stringify(daybefore));
      //   localStorage.setItem("daily-donelist", JSON.stringify(donelist));
    }

    function activeAll() {
      for (var i = 0; i < todolist.length; i++) {
        todolist[i][3] = "flex";
      }
      updateStorage();
    }
    function sortFunction(a, b) {
      //numerical order
      if (b[1] != a[1]) {
        //1 sort
        return b[1] - a[1];
      } else {
        //second sort
        return b[2] - a[2];
      }

      //alphabet
      //   if (a[1] === b[1]) {
      //     return 0;
      //   } else {
      //     return a[1] > b[1] ? -1 : 1;
      //   }
    }
    function make2dgt(n) {
      if (n < 10) {
        return (display_n = "0" + n);
      } else {
        return (display_n = n);
      }
    }
  </script>
