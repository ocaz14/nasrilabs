    function migrateData(){
        if(todolist.length === 0) return;

    function listHapus(i) {

      updateStorage();

    }

    function updateStorage() {
      localStorage.setItem("daily-todolist", JSON.stringify(todolist));
      localStorage.setItem("daybefore", JSON.stringify(daybefore));
      //   localStorage.setItem("daily-donelist", JSON.stringify(donelist));
    }

    function activeAll() {

        for (var i = 0; i < todolist.length; i++) {

          todolist[i].done = false;
          todolist[i].reminderHistory = [];

        }

        updateStorage();

    }

function sortFunction(a,b){
    if(a.hour !== b.hour){
        return a.hour - b.hour;
    }
    return a.minute - b.minute;
}

    function sendNotification(title, body) {
        if (!("Notification" in window)) return;
        if (Notification.permission !== "granted") return;
        new Notification(title, {
            body: body,
            // icon: "/img/icon-192.png",
            // badge: "/img/icon-192.png"
        });

    }

    function checkReminder() {
        for (let i = 0; i < todolist.length; i++) {
            const item = todolist[i];
            if(item.done) continue;
            let task = item.task;
            let hour = item.hour;
            let minute = item.minute;
            let targetMinute = hour * 60 + minute;
            let currentMinute = hh * 60 + mm;
            let diff = targetMinute - currentMinute;
            // reminder 10 menit
            if (diff === 10 && !item.reminderHistory.includes("10")) {
                sendNotification(
                    "⏰ Upcoming Task",
                    task + " starts in 10 minutes."
                );
                item.reminderHistory.push("10");
            }
            // reminder 5 menit
            if (diff === 5 && !item.reminderHistory.includes("5")) {
                sendNotification(
                    "⏰ Upcoming Task",
                    task + " starts in 5 minutes."
                );
                item.reminderHistory.push("5");
            }
            // saat waktunya
            if (diff === 0 && !item.reminderHistory.includes("0")) {
                sendNotification(
                    "🚀 Time to Start",
                    task
                );
                item.reminderHistory.push("0");
            }
        }
        updateStorage();
    } 

    function make2dgt(n) {
      if (n < 10) {
        return (display_n = "0" + n);
      } else {
        return (display_n = n);
      }
